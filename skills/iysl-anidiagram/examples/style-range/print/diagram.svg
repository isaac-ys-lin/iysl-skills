<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 880" width="1200" height="880"
     data-loop-seconds="10" data-poster-t="4"
     font-family="'Songti TC', 'Noto Serif TC', 'PingFang TC', Georgia, serif">
  <rect x="0" y="0" width="1200" height="880" fill="#f7f1e6"/>

  <!-- Composition move: asymmetric — a ruled masthead, ring pulled right, notes on the left -->
  <line x1="60" y1="112" x2="1140" y2="112" stroke="#2b2723" stroke-width="2"/>
  <text x="60" y="58" font-size="32" font-weight="700" fill="#2b2723">苦澀的教訓</text>
  <text x="60" y="94" font-size="15" fill="#6b5f52" font-style="italic">Rich Sutton, 2019 · 內建人類知識短期領先，長期總被算力反超</text>
  <text x="1140" y="58" text-anchor="end" font-size="14" fill="#c0562f" letter-spacing="2">A RECURRING CYCLE</text>

  <!-- Ring pulled to the right third -->
  <path id="loop-ring" d="M 800 275 A 150 150 0 1 1 800 575 A 150 150 0 1 1 800 275"
        fill="none" stroke="#cbb79a" stroke-width="2.5"/>

  <g fill="#a8927a">
    <path d="M -7 -5 L 7 0 L -7 5 Z" transform="translate(906 319) rotate(45)"/>
    <path d="M -7 -5 L 7 0 L -7 5 Z" transform="translate(906 531) rotate(135)"/>
    <path d="M -7 -5 L 7 0 L -7 5 Z" transform="translate(694 531) rotate(225)"/>
    <path d="M -7 -5 L 7 0 L -7 5 Z" transform="translate(694 319) rotate(315)"/>
  </g>

  <g fill="#efe6d5" stroke="#3f6f5e" stroke-width="2">
    <circle cx="800" cy="275" r="10"/><circle cx="950" cy="425" r="10"/>
    <circle cx="800" cy="575" r="10"/><circle cx="650" cy="425" r="10"/>
  </g>

  <g fill="none" stroke="#3f6f5e" stroke-width="2.5">
    <circle cx="800" cy="275" r="17" opacity="0">
      <animate attributeName="opacity" values="0.85;0;0;0.85" keyTimes="0;0.08;0.92;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </circle>
    <circle cx="950" cy="425" r="17" opacity="0">
      <animate attributeName="opacity" values="0;0;0.85;0;0" keyTimes="0;0.18;0.25;0.32;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </circle>
    <circle cx="800" cy="575" r="17" opacity="0">
      <animate attributeName="opacity" values="0;0;0.85;0;0" keyTimes="0;0.43;0.5;0.57;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </circle>
    <circle cx="650" cy="425" r="17" opacity="0">
      <animate attributeName="opacity" values="0;0;0.85;0;0" keyTimes="0;0.68;0.75;0.82;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </circle>
  </g>

  <circle r="6" fill="#c0562f">
    <animateMotion dur="10s" repeatCount="indefinite" rotate="none"><mpath href="#loop-ring"/></animateMotion>
  </circle>

  <!-- Stage labels sit beside their nodes (no cards; print-column feel) -->
  <g>
    <text x="800" y="254" text-anchor="middle" font-size="17" font-weight="700" fill="#2b2723">一 · 內建人類知識</text>
    <text x="800" y="228" text-anchor="middle" font-size="12" fill="#6b5f52">把領域規則、人怎麼想寫進系統</text>
  </g>
  <g>
    <text x="985" y="420" font-size="17" font-weight="700" fill="#2b2723">二 · 短期領先</text>
    <text x="985" y="442" font-size="12" fill="#6b5f52">有效，也讓研究者滿足</text>
  </g>
  <g>
    <text x="800" y="612" text-anchor="middle" font-size="17" font-weight="700" fill="#c0562f">三 · 長期撞牆</text>
    <text x="800" y="632" text-anchor="middle" font-size="12" fill="#6b5f52">停滯，甚至阻礙進一步突破</text>
  </g>
  <g>
    <text x="615" y="420" text-anchor="end" font-size="17" font-weight="700" fill="#3f6f5e">四 · 算力反超</text>
    <text x="615" y="442" text-anchor="end" font-size="12" fill="#6b5f52">搜尋＋學習，隨算力擴展</text>
  </g>

  <text x="800" y="430" text-anchor="middle" font-size="20" font-weight="700" fill="#2b2723" font-style="italic">算力 &gt; 知識</text>
  <text x="985" y="300" font-size="12" font-weight="600" fill="#c0562f">下個領域，重演一次</text>

  <!-- Left column: the thesis and evidence as a reading passage (annotation-dense margin) -->
  <text x="60" y="182" font-size="15" fill="#6b5f52" letter-spacing="1">論　旨</text>
  <line x1="60" y1="196" x2="150" y2="196" stroke="#c0562f" stroke-width="2"/>
  <text x="60" y="236" font-size="26" font-weight="700" fill="#2b2723">通用方法 ×</text>
  <text x="60" y="276" font-size="26" font-weight="700" fill="#2b2723">大規模算力</text>
  <text x="60" y="316" font-size="14" fill="#6b5f52">驅動力是 Moore's law：</text>
  <text x="60" y="338" font-size="14" fill="#6b5f52">算力成本指數下降，長期</text>
  <text x="60" y="360" font-size="14" fill="#6b5f52">大幅勝過內建的人類知識。</text>

  <text x="60" y="430" font-size="15" fill="#6b5f52" letter-spacing="1">四個領域，同一模式</text>
  <line x1="60" y1="444" x2="150" y2="444" stroke="#c0562f" stroke-width="2"/>
  <g font-size="14" fill="#43382e">
    <text x="60" y="480">· 西洋棋 — 1997 深度搜尋勝 Kasparov</text>
    <text x="60" y="510">· 圍棋 — 搜尋＋自我對弈</text>
    <text x="60" y="540">· 語音 — HMM 統計勝音素知識</text>
    <text x="60" y="570">· 電腦視覺 — SIFT → 卷積網路</text>
  </g>

  <line x1="60" y1="792" x2="1140" y2="792" stroke="#d8cab2" stroke-width="1"/>
  <text x="60" y="826" font-size="13" fill="#6b5f52" font-style="italic">search 與 learning 是唯二能隨算力任意擴展的方法。</text>
  <text x="60" y="850" font-size="13" fill="#6b5f52" font-style="italic">該內建的不是我們的答案，而是能自己發現複雜度的元方法。</text>
</svg>
