interface:
  display_name: "iysl-sync"
  short_description: "Synchronize confirmed decisions and progress into one living plan."
  default_prompt: "Use $iysl-sync to synchronize confirmed decisions and progress into the active living plan."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "generic"
  activation:
    mode: "implicit"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "native-implicit-skill"
    generic: "description-routed"
