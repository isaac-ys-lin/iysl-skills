interface:
  display_name: "ani-diagram"
  short_description: "Source-faithful animated SVG diagrams with MP4 and PNG output"
  brand_color: "#2459C7"
  default_prompt: "Use $iysl-anidiagram to extract the claim, design a source-faithful animated SVG, render MP4 and PNG outputs, and verify readability."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "native-codex-skill-with-openai-metadata"
