# Portable, public-safe Codex configuration.
# Machine-specific paths, trusted projects, local marketplaces, and local MCP servers are intentionally omitted.
sandbox_mode = "danger-full-access"
approval_policy = "never"
model_reasoning_effort = "low"
personality = "pragmatic"
web_search = "live"
model = "gpt-5.6-terra"
service_tier = "default"
approvals_reviewer = "user"
tool_output_token_limit = 25000

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[features]
voice_transcription = true
multi_agent = true
hooks = true
apps = false
prevent_idle_sleep = true
memories = true
chronicle = false
goals = true
js_repl = false

[agents]
max_threads = 5
max_depth = 2

[tui]
theme = "catppuccin-macchiato"
status_line = ["model-with-reasoning", "current-dir", "project-name", "context-used", "five-hour-limit", "weekly-limit", "context-window-size", "git-branch", "run-state", "fast-mode"]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4

[plugins."google-calendar@openai-curated"]
enabled = false

[plugins."google-drive@openai-curated"]
enabled = false

[plugins."gmail@openai-curated"]
enabled = false

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."build-ios-apps@openai-curated"]
enabled = true

[plugins."remotion@openai-curated"]
enabled = false

[plugins."codex-security@openai-curated"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."record-and-replay@openai-bundled"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[plugins."kami@kami"]
enabled = true

[plugins."sites@openai-bundled"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[memories]
no_memories_if_mcp_or_web_search = false

[desktop]
appearanceTheme = "system"
appearanceLightCodeThemeId = "absolutely"
appearanceDarkCodeThemeId = "catppuccin"
sansFontSize = 16
codeFontSize = 16
usePointerCursors = true
mac-menu-bar-enabled = true
followUpQueueMode = "queue"
composerEnterBehavior = "cmdIfMultiline"
reviewDelivery = "inline"
preventSleepWhileRunning = true
keepRemoteControlAwakeWhilePluggedIn = true
git-always-force-push = false
git-create-pull-request-as-draft = true
git-show-sidebar-pr-icons = true
notifications-turn-mode = "always"
selected-avatar-id = "null-signal"
appearanceDiffMarkerStyle = "color"
show-context-window-usage = true
hotkey-window-projectless-default-enabled = true
dictationDictionary = []
dock-icon-preference = "codex-system"
conversationDetailMode = "STEPS_COMMANDS"
avatar-overlay-mascot-width-px = 142
open-link-in-target-preference = "in-app-browser"
enabled-reasoning-efforts = ["low", "medium", "high", "xhigh", "ultra", "max"]

[desktop.appearanceLightChromeTheme]
accent = "#c96f4f"
contrast = 68
ink = "#343640"
opaqueWindows = true
surface = "#eff1f5"

[desktop.appearanceLightChromeTheme.fonts]
code = "SF Mono"
ui = "LXGW WenKai TC"

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#3f8f4f"
diffRemoved = "#cf4f4f"
skill = "#6b6fa8"

[desktop.appearanceDarkChromeTheme]
accent = "#cba6f7"
contrast = 60
ink = "#cdd6f4"
opaqueWindows = false
surface = "#1e1e2e"

[desktop.appearanceDarkChromeTheme.fonts]

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#a6e3a1"
diffRemoved = "#f38ba8"
skill = "#cba6f7"

[desktop.open-in-target-preferences]
global = "fileManager"
