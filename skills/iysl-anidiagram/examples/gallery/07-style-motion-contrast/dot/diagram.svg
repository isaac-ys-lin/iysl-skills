    <animate attributeName="r" values="42;42;38;44;42;42" keyTimes="0;0.22;0.25;0.47;0.5;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
