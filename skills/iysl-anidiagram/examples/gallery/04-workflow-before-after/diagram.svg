<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675"
     data-loop-seconds="8" data-poster-t="3.8"
     font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <rect x="0" y="0" width="1200" height="675" fill="#f6f8fb"/>

  <!-- Claim level -->
  <text x="600" y="50" text-anchor="middle" font-size="30" font-weight="700" fill="#182032">Same task, two operating modes</text>
  <text x="600" y="78" text-anchor="middle" font-size="14" fill="#6b7890">Ad hoc manual work runs on memory and luck — the verified agent-assisted mode produces evidence</text>

  <!-- Panel frames -->
  <rect x="60" y="130" width="480" height="460" rx="14" fill="#faf6f3" stroke="#e3d5cb" stroke-width="1.5"/>
  <rect x="660" y="130" width="480" height="460" rx="14" fill="#f4f8fd" stroke="#c9d6ef" stroke-width="1.5"/>
  <rect x="60" y="130" width="480" height="460" rx="14" fill="none" stroke="#c0836a" stroke-width="2.5" opacity="0">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
  </rect>
  <rect x="660" y="130" width="480" height="460" rx="14" fill="none" stroke="#2459c7" stroke-width="2.5" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.45;0.5;0.95;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
  </rect>

  <!-- Panel headers (eyebrows stay static) -->
  <text x="80" y="164" font-size="12" font-weight="600" letter-spacing="2" fill="#8a6d5c">BEFORE</text>
  <text x="680" y="164" font-size="12" font-weight="600" letter-spacing="2" fill="#2459c7">AFTER</text>
  <rect x="80" y="196" width="130" height="4" rx="2" fill="#c0836a" opacity="0.15">
    <animate attributeName="opacity" values="1;1;0.15;0.15;1" keyTimes="0;0.45;0.5;0.95;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
  </rect>
  <rect x="680" y="196" width="130" height="4" rx="2" fill="#2459c7" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.15;1;1;0.15" keyTimes="0;0.45;0.5;0.95;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
  </rect>

  <!-- Center spine: shared checkpoints -->
  <text x="600" y="158" text-anchor="middle" font-size="12" fill="#6b7890">same task</text>
  <line x1="568" y1="172" x2="622" y2="172" stroke="#8aa3d8" stroke-width="2"/>
  <path d="M 620 166 L 632 172 L 620 178 Z" fill="#8aa3d8"/>
  <g stroke="#b8c8ee" stroke-width="2" stroke-linecap="round" stroke-dasharray="1 6">
    <line x1="546" y1="240" x2="558" y2="240"/><line x1="642" y1="240" x2="654" y2="240"/>
    <line x1="546" y1="330" x2="558" y2="330"/><line x1="642" y1="330" x2="654" y2="330"/>
    <line x1="546" y1="420" x2="558" y2="420"/><line x1="642" y1="420" x2="654" y2="420"/>
    <line x1="546" y1="510" x2="558" y2="510"/><line x1="642" y1="510" x2="654" y2="510"/>
  </g>
  <text x="600" y="244" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7890">Intake</text>
  <text x="600" y="334" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7890">Execution</text>
  <text x="600" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7890">Verification</text>
  <text x="600" y="514" text-anchor="middle" font-size="13" font-weight="600" fill="#6b7890">Handoff</text>

  <!-- BEFORE content (dims while AFTER is being read) -->
  <g>
    <animate attributeName="opacity" values="1;1;0.45;0.45;1" keyTimes="0;0.45;0.5;0.95;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    <text x="80" y="188" font-size="20" font-weight="700" fill="#182032">Ad hoc manual</text>

    <rect x="80" y="208" width="440" height="64" rx="10" fill="#ffffff" stroke="#e3d5cb" stroke-width="1.5" stroke-dasharray="6 4"/>
    <circle cx="102" cy="240" r="8" fill="#f4e8e2" stroke="#c0836a" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="122" y="236" font-size="15" font-weight="600" fill="#182032">Requests arrive in chat or email</text>
    <text x="122" y="257" font-size="12" fill="#8a7568">Context is inconsistent from one request to the next</text>

    <rect x="80" y="298" width="440" height="64" rx="10" fill="#ffffff" stroke="#e3d5cb" stroke-width="1.5" stroke-dasharray="6 4"/>
    <circle cx="102" cy="330" r="8" fill="#f4e8e2" stroke="#c0836a" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="122" y="326" font-size="15" font-weight="600" fill="#182032">Collect files by hand, retype details</text>
    <text x="122" y="347" font-size="12" fill="#8a7568">Tool usage is improvised per operator</text>

    <rect x="80" y="388" width="440" height="64" rx="10" fill="#ffffff" stroke="#e3d5cb" stroke-width="1.5" stroke-dasharray="6 4"/>
    <circle cx="102" cy="420" r="8" fill="#f4e8e2" stroke="#c0836a" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="122" y="416" font-size="15" font-weight="600" fill="#182032">Verification is optional</text>
    <text x="122" y="437" font-size="12" fill="#8a7568">Quality depends on memory and luck</text>

    <rect x="80" y="478" width="440" height="64" rx="10" fill="#ffffff" stroke="#e3d5cb" stroke-width="1.5" stroke-dasharray="6 4"/>
    <circle cx="102" cy="510" r="8" fill="#f4e8e2" stroke="#c0836a" stroke-width="2" stroke-dasharray="3 2"/>
    <text x="122" y="506" font-size="15" font-weight="600" fill="#182032">Decisions and follow-ups get lost</text>
    <text x="122" y="527" font-size="12" fill="#8a7568">No durable record of what was agreed</text>

    <text x="300" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="#8a6d5c">Outcome depends on who remembers</text>
  </g>

  <!-- AFTER content (dims while BEFORE is being read) -->
  <g opacity="0.45">
    <animate attributeName="opacity" values="0.45;0.45;1;1;0.45" keyTimes="0;0.45;0.5;0.95;1" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    <text x="680" y="188" font-size="20" font-weight="700" fill="#182032">Verified agent-assisted</text>

    <rect x="680" y="208" width="440" height="64" rx="10" fill="#ffffff" stroke="#c9d6ef" stroke-width="1.5"/>
    <circle cx="702" cy="240" r="8" fill="#dce8fb" stroke="#2459c7" stroke-width="2"/>
    <path d="M 698 240 L 701 243.5 L 706.5 236.5" fill="none" stroke="#2459c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="722" y="236" font-size="15" font-weight="600" fill="#182032">Reusable intake pattern</text>
    <text x="722" y="257" font-size="12" fill="#5b7099">Scope, risks, and artifacts captured up front</text>

    <rect x="680" y="298" width="440" height="64" rx="10" fill="#ffffff" stroke="#c9d6ef" stroke-width="1.5"/>
    <circle cx="702" cy="330" r="8" fill="#dce8fb" stroke="#2459c7" stroke-width="2"/>
    <path d="M 698 330 L 701 333.5 L 706.5 326.5" fill="none" stroke="#2459c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="722" y="326" font-size="15" font-weight="600" fill="#182032">Explicit, tool-backed agent steps</text>
    <text x="722" y="347" font-size="12" fill="#5b7099">Every step is verified before handoff</text>

    <rect x="680" y="388" width="440" height="64" rx="10" fill="#ffffff" stroke="#c9d6ef" stroke-width="1.5"/>
    <circle cx="702" cy="420" r="8" fill="#dce8fb" stroke="#2459c7" stroke-width="2"/>
    <path d="M 698 420 L 701 423.5 L 706.5 416.5" fill="none" stroke="#2459c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="722" y="416" font-size="15" font-weight="600" fill="#182032">High-risk side effects reviewed</text>
    <text x="722" y="437" font-size="12" fill="#5b7099">Review happens before execution, not after</text>

    <rect x="680" y="478" width="440" height="64" rx="10" fill="#ffffff" stroke="#c9d6ef" stroke-width="1.5"/>
    <circle cx="702" cy="510" r="8" fill="#dce8fb" stroke="#2459c7" stroke-width="2"/>
    <path d="M 698 510 L 701 513.5 L 706.5 506.5" fill="none" stroke="#2459c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="722" y="506" font-size="15" font-weight="600" fill="#182032">Outputs ship with evidence</text>
    <text x="722" y="527" font-size="12" fill="#5b7099">Changed files and known limits included</text>

    <text x="900" y="572" text-anchor="middle" font-size="12" font-weight="600" fill="#2459c7">Outcome is verifiable by anyone</text>
  </g>

  <!-- Detail level: footnote -->
  <text x="600" y="640" text-anchor="middle" font-size="13" fill="#6b7890">The shift is the operating mode, not the task list — each row is the same checkpoint under a different contract.</text>
</svg>
