<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675"
     data-loop-seconds="9" data-poster-t="7.2"
     font-family="'SFMono-Regular', 'Roboto Mono', 'PingFang TC', 'Noto Sans TC', Menlo, monospace">
  <defs>
    <marker id="arrow-amber" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L9 5 L1 9 Z" fill="#ffb44c"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1 1 L9 5 L1 9 Z" fill="#b7f34a"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#11161a"/>
  <path d="M0 96 H1200 M0 136 H1200 M0 538 H1200 M0 638 H1200" stroke="#344047" stroke-width="1"/>
  <path d="M34 0 V675 M390 136 V538 M814 136 V538 M1166 0 V675" stroke="#273137" stroke-width="1"/>
  <path d="M0 160 L1200 52 M0 205 L1200 97" stroke="#1d272c" stroke-width="1"/>

  <text x="34" y="38" fill="#91a0a8" font-size="12" letter-spacing="2.5">事故運作現場 / 系統安全</text>
  <text x="34" y="78" fill="#f2f4ef" font-family="'Helvetica Neue', 'PingFang TC', 'Noto Sans TC', Arial, sans-serif" font-size="34" font-weight="700">安全，是在危險系統中持續創造出來的。</text>
  <text x="1166" y="38" fill="#ffb44c" font-size="12" text-anchor="end">COOK / 複雜系統</text>
  <text x="1166" y="102" fill="#91a0a8" font-size="13" text-anchor="end">一條事故軌跡 · 多重促成因素</text>

  <text x="34" y="124" fill="#ffb44c" font-size="13" font-weight="700">01 / 壓力 + 潛在缺陷</text>
  <text x="407" y="124" fill="#b7f34a" font-size="13" font-weight="700">02 / 防禦 + 調適</text>
  <text x="831" y="124" fill="#ff705c" font-size="13" font-weight="700">03 / 事故邊界</text>

  <!-- Full-bleed operating corridor -->
  <path d="M-30 521 L1225 142 L1225 300 L-30 679 Z" fill="#182127" opacity="0.92"/>
  <path d="M-30 521 L1225 142" stroke="#4b5960" stroke-width="1.5" stroke-dasharray="5 7"/>
  <path d="M-30 679 L1225 300" stroke="#4b5960" stroke-width="1.5" stroke-dasharray="5 7"/>

  <!-- Incoming conditions -->
  <circle cx="112" cy="397" r="8" fill="#ffb44c"/>
  <circle cx="143" cy="438" r="5" fill="#ff705c"/>
  <circle cx="91" cy="474" r="6" fill="#ffb44c" opacity="0.8"/>
  <path d="M54 360 H257" stroke="#57656c" stroke-width="1"/>
  <text x="54" y="350" fill="#f2f4ef" font-size="16" font-weight="700">危險無法完全消除</text>
  <text x="54" y="376" fill="#aeb8bd" font-size="12">潛在缺陷始終存在</text>
  <text x="54" y="393" fill="#aeb8bd" font-size="12">組合也不斷改變。</text>
  <text x="54" y="495" fill="#ffb44c" font-size="12">技術變動 · 成本壓力 · 產出要求</text>
  <text x="54" y="514" fill="#91a0a8" font-size="12">改變可能開啟新的失敗路徑</text>

  <!-- Safe-state trajectory: designed defense redirects it; human adaptation terminates it. -->
  <path id="safe-trajectory" d="M145 445 C250 430 330 404 414 376 Q452 356 484 404 C545 433 603 385 650 347 Q684 319 707 363 Q724 403 679 445"
        fill="none" stroke="#ffb44c" stroke-width="4" stroke-dasharray="10 11" marker-end="url(#arrow-green)">
    <animate attributeName="stroke-dashoffset" values="0;-21" dur="9s" repeatCount="indefinite" calcMode="linear"/>
  </path>
  <text x="542" y="421" fill="#b7f34a" font-size="11">安全狀態 / 已攔截</text>
  <circle r="7" fill="#fff2c7" stroke="#ffb44c" stroke-width="2" opacity="0">
    <animateMotion dur="9s" repeatCount="indefinite" calcMode="spline" keyPoints="0;0;1;1;0" keyTimes="0;0.05;0.60;0.68;1" keySplines="0 0 1 1;0.77 0 0.175 1;0 0 1 1;0.77 0 0.175 1">
      <mpath href="#safe-trajectory"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.04;0.60;0.66;1" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1;0 0 1 1;0.23 1 0.32 1;0 0 1 1"/>
  </circle>

  <!-- A distinct final opportunity exists only after both defense gaps align. -->
  <path id="aligned-trajectory" d="M367 397 C430 383 493 367 553 347 C619 326 680 307 744 289 C850 258 955 227 1064 205"
        fill="none" stroke="#ff705c" stroke-width="4" stroke-dasharray="10 11" marker-end="url(#arrow-amber)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.74;0.76;0.90;0.94;1" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.23 1 0.32 1;0 0 1 1;0.23 1 0.32 1;0 0 1 1"/>
    <animate attributeName="stroke-dashoffset" values="0;-21" dur="9s" repeatCount="indefinite" calcMode="linear"/>
  </path>
  <circle r="7" fill="#fff2c7" stroke="#ff705c" stroke-width="2" opacity="0">
    <animateMotion dur="9s" repeatCount="indefinite" calcMode="spline" keyPoints="0;0;1;1;0" keyTimes="0;0.78;0.91;0.94;1" keySplines="0 0 1 1;0.77 0 0.175 1;0 0 1 1;0.77 0 0.175 1">
      <mpath href="#aligned-trajectory"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.76;0.78;0.92;0.94;1" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.23 1 0.32 1;0 0 1 1;0.23 1 0.32 1;0 0 1 1"/>
  </circle>
  <text x="885" y="276" fill="#ff705c" font-size="11">缺口短暫對齊 / 最終逼近</text>

  <!-- Defense 1 -->
  <path d="M420 291 L479 478" stroke="#58a8bc" stroke-width="10"/>
  <path d="M416 291 L475 478" stroke="#b9e8f0" stroke-width="2"/>
  <path d="M397 311 L425 303 M410 350 L438 342 M423 389 L451 381 M436 428 L464 420" stroke="#58a8bc" stroke-width="3"/>
  <path d="M435 324 L450 370" stroke="#182127" stroke-width="15">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 0;18 51;18 51;0 0" keyTimes="0;0.62;0.72;0.94;1" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.77 0 0.175 1;0 0 1 1;0.77 0 0.175 1"/>
  </path>
  <circle cx="463" cy="381" r="27" fill="none" stroke="#b7f34a" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.18;0.24;0.40;0.46;1" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.23 1 0.32 1;0 0 1 1;0.23 1 0.32 1;0 0 1 1"/>
  </circle>
  <text x="398" y="266" fill="#b9e8f0" font-size="14" font-weight="700">設計防禦</text>
  <text x="398" y="284" fill="#91a0a8" font-size="11">技術 · 組織 · 監管</text>

  <!-- Human adaptation 2 -->
  <path d="M661 260 L747 430" stroke="#719431" stroke-width="12"/>
  <path d="M657 260 L743 430" stroke="#b7f34a" stroke-width="2"/>
  <path d="M644 279 L673 265 M664 318 L693 304 M684 357 L713 343 M704 396 L733 382" stroke="#719431" stroke-width="3"/>
  <path d="M705 353 L728 399" stroke="#182127" stroke-width="16">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 0;-26 -51;-26 -51;0 0" keyTimes="0;0.62;0.72;0.94;1" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.77 0 0.175 1;0 0 1 1;0.77 0 0.175 1"/>
  </path>
  <circle cx="694" cy="329" r="30" fill="none" stroke="#b7f34a" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.42;0.48;0.64;0.70;1" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.23 1 0.32 1;0 0 1 1;0.23 1 0.32 1;0 0 1 1"/>
  </circle>
  <text x="606" y="232" fill="#b7f34a" font-size="14" font-weight="700">第一線調適</text>
  <text x="606" y="250" fill="#91a0a8" font-size="11">人員隨時調整風險方向</text>

  <!-- changing gaps / alignment -->
  <path d="M805 224 L836 397 M852 214 L883 387 M899 204 L930 377" stroke="#ff705c" stroke-width="5" stroke-dasharray="25 13"/>
  <path d="M804 286 L931 248" stroke="#ffb44c" stroke-width="2" stroke-dasharray="3 5"/>
  <text x="790" y="413" fill="#ff705c" font-size="13" font-weight="700">缺口持續變動</text>
  <text x="790" y="431" fill="#aeb8bd" font-size="11">單一小故障不足以致災</text>
  <text x="790" y="447" fill="#aeb8bd" font-size="11">災難需要罕見的故障組合</text>

  <!-- accident boundary -->
  <path d="M1040 142 L1137 470" stroke="#ff705c" stroke-width="3"/>
  <path d="M1058 139 L1155 467" stroke="#ff705c" stroke-width="1" stroke-dasharray="4 5"/>
  <text x="1113" y="187" fill="#ff705c" font-size="13" font-weight="700" transform="rotate(73 1113 187)">事故邊界</text>
  <circle cx="1064" cy="205" r="22" fill="none" stroke="#ff705c" stroke-width="3" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.76;0.78;0.92;0.94;1" dur="9s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0.23 1 0.32 1;0 0 1 1;0.23 1 0.32 1;0 0 1 1"/>
  </circle>

  <!-- Whole-system claim -->
  <path d="M350 474 H784" stroke="#b7f34a" stroke-width="1" marker-end="url(#arrow-green)"/>
  <text x="360" y="498" fill="#f2f4ef" font-size="16" font-weight="700">安全是動態湧現的系統特性</text>
  <text x="360" y="520" fill="#b7f34a" font-size="12">不屬於單一元件 · 由整個系統持續創造</text>

  <!-- Bottom ruled evidence ledger: static poster carries every must-keep fact -->
  <text x="34" y="560" fill="#ffb44c" font-size="12" font-weight="700">系統條件</text>
  <text x="34" y="583" fill="#d8dddf" font-size="12">F1  本質上帶有危險</text>
  <text x="34" y="601" fill="#d8dddf" font-size="12">F4  潛在缺陷持續變動</text>
  <text x="34" y="619" fill="#d8dddf" font-size="12">F5  劣化模式才是常態</text>

  <text x="300" y="560" fill="#b7f34a" font-size="12" font-weight="700">多層縱深防禦</text>
  <text x="300" y="583" fill="#d8dddf" font-size="12">F2  技術 · 人員 · 組織 · 監管</text>
  <text x="300" y="601" fill="#d8dddf" font-size="12">F3  多個小故障必須同時串連</text>
  <text x="300" y="619" fill="#d8dddf" font-size="12">F14 改變可能創造新的失敗路徑</text>

  <text x="690" y="560" fill="#b7f34a" font-size="12" font-weight="700">可調適的核心元素</text>
  <text x="690" y="583" fill="#d8dddf" font-size="12">F9  操作人員同時生產並防禦</text>
  <text x="690" y="601" fill="#d8dddf" font-size="12">F11 第一線行動化解成本 / 風險矛盾</text>
  <text x="690" y="619" fill="#d8dddf" font-size="12">F12 / F17 人員持續調適以創造安全</text>

  <!-- Post-accident trap, deliberately weighted to right edge -->
  <path d="M836 466 H1166 V534 H836" fill="#161216" stroke="#ff705c" stroke-width="1.5"/>
  <text x="850" y="491" fill="#ff705c" font-size="12" font-weight="700">事故後的認知陷阱</text>
  <text x="850" y="510" fill="#f2f4ef" font-size="12">F7  「根本原因」 ≠ 系統路徑</text>
  <text x="850" y="526" fill="#aeb8bd" font-size="11">F8  已知結果會造成後見之明偏誤</text>

  <text x="34" y="660" fill="#66777f" font-size="10">來源 / RICHARD I. COOK · 複雜系統如何失敗</text>
  <text x="1166" y="660" fill="#66777f" font-size="10" text-anchor="end">現場圖 A · 09.0 秒循環 · 海報 07.2 秒</text>
</svg>
