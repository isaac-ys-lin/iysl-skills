<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360"
     data-loop-seconds="4" data-poster-t="3.2"
     font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <rect x="0" y="0" width="640" height="360" fill="#f6f8fb"/>

  <text x="320" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#182032">三步驟上線流程</text>
  <text x="320" y="76" text-anchor="middle" font-size="14" fill="#6b7890">規劃、開發、發布依序推進</text>

  <path id="flowline" d="M 120 200 L 520 200" stroke="#b8c8ee" stroke-width="3" fill="none"/>

  <g opacity="0">
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.92;1"
             dur="4s" repeatCount="indefinite"/>
    <circle cx="140" cy="200" r="26" fill="#dce8fb" stroke="#2459c7" stroke-width="2.5"/>
    <text x="140" y="206" text-anchor="middle" font-size="16" fill="#182032">規劃</text>
    <text x="140" y="252" text-anchor="middle" font-size="12" fill="#6b7890">定義範圍與目標</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.25;0.33;0.92;1"
             dur="4s" repeatCount="indefinite"/>
    <circle cx="320" cy="200" r="26" fill="#dce8fb" stroke="#2459c7" stroke-width="2.5"/>
    <text x="320" y="206" text-anchor="middle" font-size="16" fill="#182032">開發</text>
    <text x="320" y="252" text-anchor="middle" font-size="12" fill="#6b7890">迭代實作與測試</text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.5;0.58;0.92;1"
             dur="4s" repeatCount="indefinite"/>
    <circle cx="500" cy="200" r="26" fill="#dce8fb" stroke="#2459c7" stroke-width="2.5"/>
    <text x="500" y="206" text-anchor="middle" font-size="16" fill="#182032">發布</text>
    <text x="500" y="252" text-anchor="middle" font-size="12" fill="#6b7890">上線並監控成效</text>
  </g>

  <circle r="5" fill="#2459c7">
    <animateMotion dur="4s" repeatCount="indefinite" rotate="none">
      <mpath href="#flowline"/>
    </animateMotion>
  </circle>
</svg>
