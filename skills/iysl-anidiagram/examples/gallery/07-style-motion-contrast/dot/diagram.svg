<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675"
     data-loop-seconds="8" data-poster-t="6.4"
     font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <rect width="1200" height="675" fill="#f6f8fc"/>

  <text x="600" y="52" text-anchor="middle" font-size="32" font-weight="700" fill="#172033">Where is active attention now?</text>
  <text x="600" y="82" text-anchor="middle" font-size="14" fill="#68758d">One focus marker moves across the same four-stage support path</text>

  <rect x="56" y="120" width="1088" height="438" rx="22" fill="#ffffff" stroke="#dbe2ef" stroke-width="1.5"/>
  <text x="88" y="158" font-size="12" font-weight="700" letter-spacing="1.6" fill="#6b7890">SHARED SUPPORT PATH</text>
  <rect x="930" y="139" width="182" height="30" rx="15" fill="#edf2ff"/>
  <circle cx="950" cy="154" r="5" fill="#315fce"/>
  <text x="966" y="159" font-size="12" font-weight="600" fill="#315fce">ACTIVE FOCUS</text>

  <path d="M 252 319 H 948" fill="none" stroke="#c8d3e5" stroke-width="6" stroke-linecap="round"/>
  <path d="M 385 312 L 399 319 L 385 326 Z M 633 312 L 647 319 L 633 326 Z M 881 312 L 895 319 L 881 326 Z" fill="#9eacc2"/>

  <g>
    <rect x="76" y="205" width="232" height="228" rx="18" fill="#f8faff" stroke="#cfd9eb" stroke-width="2"/>
    <circle cx="192" cy="319" r="30" fill="#e3ebfb" stroke="#7c96c5" stroke-width="2"/>
    <text x="192" y="327" text-anchor="middle" font-size="22" font-weight="700" fill="#315fce">01</text>
    <text x="192" y="252" text-anchor="middle" font-size="21" font-weight="700" fill="#172033">Intake</text>
    <text x="192" y="278" text-anchor="middle" font-size="13" fill="#68758d">Capture request and context</text>
    <rect x="112" y="373" width="160" height="34" rx="17" fill="#edf2ff"/>
    <text x="192" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#315fce">Service desk</text>
  </g>
  <g>
    <rect x="324" y="205" width="232" height="228" rx="18" fill="#f8faff" stroke="#cfd9eb" stroke-width="2"/>
    <circle cx="440" cy="319" r="30" fill="#e3ebfb" stroke="#7c96c5" stroke-width="2"/>
    <text x="440" y="327" text-anchor="middle" font-size="22" font-weight="700" fill="#315fce">02</text>
    <text x="440" y="252" text-anchor="middle" font-size="21" font-weight="700" fill="#172033">Triage</text>
    <text x="440" y="278" text-anchor="middle" font-size="13" fill="#68758d">Assess urgency and route</text>
    <rect x="360" y="373" width="160" height="34" rx="17" fill="#edf2ff"/>
    <text x="440" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#315fce">Support lead</text>
  </g>
  <g>
    <rect x="572" y="205" width="232" height="228" rx="18" fill="#f8faff" stroke="#cfd9eb" stroke-width="2"/>
    <circle cx="688" cy="319" r="30" fill="#e3ebfb" stroke="#7c96c5" stroke-width="2"/>
    <text x="688" y="327" text-anchor="middle" font-size="22" font-weight="700" fill="#315fce">03</text>
    <text x="688" y="252" text-anchor="middle" font-size="21" font-weight="700" fill="#172033">Specialist work</text>
    <text x="688" y="278" text-anchor="middle" font-size="13" fill="#68758d">Investigate and resolve</text>
    <rect x="608" y="373" width="160" height="34" rx="17" fill="#edf2ff"/>
    <text x="688" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#315fce">Domain specialist</text>
  </g>
  <g>
    <rect x="820" y="205" width="232" height="228" rx="18" fill="#f8faff" stroke="#cfd9eb" stroke-width="2"/>
    <circle cx="936" cy="319" r="30" fill="#e3ebfb" stroke="#7c96c5" stroke-width="2"/>
    <text x="936" y="327" text-anchor="middle" font-size="22" font-weight="700" fill="#315fce">04</text>
    <text x="936" y="252" text-anchor="middle" font-size="21" font-weight="700" fill="#172033">Customer closeout</text>
    <text x="936" y="278" text-anchor="middle" font-size="13" fill="#68758d">Confirm outcome and close</text>
    <rect x="856" y="373" width="160" height="34" rx="17" fill="#edf2ff"/>
    <text x="936" y="395" text-anchor="middle" font-size="13" font-weight="600" fill="#315fce">Service desk</text>
  </g>

