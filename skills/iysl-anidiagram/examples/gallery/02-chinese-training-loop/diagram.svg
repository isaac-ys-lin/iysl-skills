<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800"
     data-loop-seconds="10" data-poster-t="4"
     font-family="'PingFang TC', 'Noto Sans TC', 'Helvetica Neue', Arial, sans-serif">
  <rect x="0" y="0" width="1200" height="800" fill="#f6f8fb"/>

  <!-- Claim level: title reads in 3 seconds -->
  <text x="600" y="54" text-anchor="middle" font-size="32" font-weight="700" fill="#182032">會議越多，資訊越散</text>
  <text x="600" y="86" text-anchor="middle" font-size="15" fill="#6b7890">補救式開會不是解方，而是升級循環的一環——每一步都把下一步推得更強</text>

  <!-- Ring: the closed path the pulse travels forever -->
  <path id="loop-ring" d="M 600 267 A 195 195 0 1 1 600 657 A 195 195 0 1 1 600 267"
        fill="none" stroke="#b8c8ee" stroke-width="3"/>

  <!-- Direction arrowheads at the five arc midpoints (clockwise) -->
  <g fill="#8aa3d8">
    <path d="M -8 -5.5 L 8 0 L -8 5.5 Z" transform="translate(715 304) rotate(36)"/>
    <path d="M -8 -5.5 L 8 0 L -8 5.5 Z" transform="translate(785 522) rotate(108)"/>
    <path d="M -8 -5.5 L 8 0 L -8 5.5 Z" transform="translate(600 657) rotate(180)"/>
    <path d="M -8 -5.5 L 8 0 L -8 5.5 Z" transform="translate(415 522) rotate(252)"/>
    <path d="M -8 -5.5 L 8 0 L -8 5.5 Z" transform="translate(485 304) rotate(-36)"/>
  </g>

  <!-- Card-to-node connectors (drawn under the cards) -->
  <g stroke="#c9d6ef" stroke-width="1.5">
    <line x1="600" y1="207" x2="600" y2="256"/>
    <line x1="895" y1="366" x2="796" y2="399"/>
    <line x1="782" y1="713" x2="721" y2="631"/>
    <line x1="418" y1="713" x2="479" y2="631"/>
    <line x1="305" y1="366" x2="404" y2="399"/>
  </g>

  <!-- Node circles on the ring -->
  <g fill="#dce8fb" stroke="#2459c7" stroke-width="2">
    <circle cx="600" cy="267" r="11"/>
    <circle cx="785" cy="402" r="11"/>
    <circle cx="715" cy="620" r="11"/>
    <circle cx="485" cy="620" r="11"/>
    <circle cx="415" cy="402" r="11"/>
  </g>

  <!-- Node halos: light up as the pulse arrives (staggered, seamless) -->
  <g fill="none" stroke="#2459c7" stroke-width="2.5">
    <circle cx="600" cy="267" r="19" opacity="0">
      <animate attributeName="opacity" values="0.9;0;0;0.9" keyTimes="0;0.1;0.9;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </circle>
    <circle cx="785" cy="402" r="19" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.13;0.2;0.27;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </circle>
    <circle cx="715" cy="620" r="19" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.33;0.4;0.47;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </circle>
    <circle cx="485" cy="620" r="19" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.53;0.6;0.67;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </circle>
    <circle cx="415" cy="402" r="19" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.73;0.8;0.87;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </circle>
  </g>

  <!-- The circulating pulse: no start, no end -->
  <g>
    <circle r="13" fill="#2459c7" opacity="0.25">
      <animateMotion dur="10s" repeatCount="indefinite" rotate="none">
        <mpath href="#loop-ring"/>
      </animateMotion>
    </circle>
    <circle r="7" fill="#2459c7">
      <animateMotion dur="10s" repeatCount="indefinite" rotate="none">
        <mpath href="#loop-ring"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Structure level: five stage cards -->
  <g>
    <rect x="485" y="143" width="230" height="64" rx="10" fill="#ffffff" stroke="#c9d6ef" stroke-width="1.5"/>
    <rect x="485" y="143" width="230" height="64" rx="10" fill="none" stroke="#2459c7" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0.9;0;0;0.9" keyTimes="0;0.1;0.9;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </rect>
    <text x="600" y="170" text-anchor="middle" font-size="16" font-weight="600" fill="#182032">資訊沒有先整理</text>
    <text x="600" y="193" text-anchor="middle" font-size="12" fill="#6b7890">需求、風險、決策未成為可判斷的內容</text>
  </g>
  <g>
    <rect x="780" y="334" width="230" height="64" rx="10" fill="#ffffff" stroke="#c9d6ef" stroke-width="1.5"/>
    <rect x="780" y="334" width="230" height="64" rx="10" fill="none" stroke="#2459c7" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.13;0.2;0.27;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </rect>
    <text x="895" y="361" text-anchor="middle" font-size="16" font-weight="600" fill="#182032">主管不安，加開會議</text>
    <text x="895" y="384" text-anchor="middle" font-size="12" fill="#6b7890">用更多同步會議確認進度</text>
  </g>
  <g>
    <rect x="667" y="681" width="230" height="64" rx="10" fill="#ffffff" stroke="#c9d6ef" stroke-width="1.5"/>
    <rect x="667" y="681" width="230" height="64" rx="10" fill="none" stroke="#2459c7" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.33;0.4;0.47;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </rect>
    <text x="782" y="708" text-anchor="middle" font-size="16" font-weight="600" fill="#182032">資訊更散</text>
    <text x="782" y="731" text-anchor="middle" font-size="12" fill="#6b7890">決策散落在口頭對話與零碎訊息裡</text>
  </g>
  <g>
    <rect x="303" y="681" width="230" height="64" rx="10" fill="#ffffff" stroke="#c9d6ef" stroke-width="1.5"/>
    <rect x="303" y="681" width="230" height="64" rx="10" fill="none" stroke="#2459c7" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.53;0.6;0.67;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </rect>
    <text x="418" y="708" text-anchor="middle" font-size="16" font-weight="600" fill="#182032">返工增加</text>
    <text x="418" y="731" text-anchor="middle" font-size="12" fill="#6b7890">回頭撈決策、補紀錄、重新確認</text>
  </g>
  <g>
    <rect x="190" y="334" width="230" height="64" rx="10" fill="#ffffff" stroke="#c9d6ef" stroke-width="1.5"/>
    <rect x="190" y="334" width="230" height="64" rx="10" fill="none" stroke="#2459c7" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.73;0.8;0.87;1" dur="10s" repeatCount="indefinite" calcMode="spline" keySplines="0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1 ; 0.23 1 0.32 1"/>
    </rect>
    <text x="305" y="361" text-anchor="middle" font-size="16" font-weight="600" fill="#182032">下次更早開會</text>
    <text x="305" y="384" text-anchor="middle" font-size="12" fill="#6b7890">循環被強化，一圈比一圈嚴重</text>
  </g>

  <!-- Center consequence: what the loop keeps eating -->
  <text x="600" y="436" text-anchor="middle" font-size="15" fill="#6b7890">整理、對齊、定義決策的時間</text>
  <text x="600" y="480" text-anchor="middle" font-size="26" font-weight="700" fill="#b3452e">越來越少</text>
  <text x="600" y="514" text-anchor="middle" font-size="12" fill="#6b7890">時間改流向開會、撈訊息、補紀錄</text>

  <!-- Escalation tag on the loop closure: back to the start, but worse -->
  <text x="428" y="278" text-anchor="middle" font-size="12" font-weight="600" fill="#b3452e">回到原點，但更糟</text>

  <!-- Detail level: footnote -->
  <text x="600" y="778" text-anchor="middle" font-size="13" fill="#6b7890">這不是一次性的事件序列——循環每繞一圈：會議更早開、資訊更碎、返工更多。</text>
</svg>
